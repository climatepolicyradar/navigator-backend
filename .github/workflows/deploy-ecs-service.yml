name: Deploy ECS Services
on:
  workflow_call:
    inputs:
      ecs_services:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-ecs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJSON(inputs.environment) }}
        service: ${{ fromJSON(inputs.ecs_services) }}
      fail-fast: false
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/navigator-backend-github-actions-deploy
          role-session-name: GitHub_to_AWS_via_FederatedOIDC_${{ matrix.environment }}
          aws-region: eu-west-1
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages
      - uses: extractions/setup-just@v4
      - name: Build and push image
        run: |
          just build ${{ matrix.service }} ${{ matrix.environment }} ${{ github.sha }}
          docker tag ${{ matrix.service }}:${{ github.sha }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/${{ matrix.service }}:${{ github.sha }}
          docker tag ${{ matrix.service }}:${{ github.sha }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/${{ matrix.service }}:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/${{ matrix.service }}:latest
      - id: deploy
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          cluster: api-services-${{ matrix.environment }}
          service-name: ${{ matrix.service }}-${{ matrix.environment }}
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/${{ matrix.service }}:${{ github.sha }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/api-services-${{ matrix.environment }}-task-execution-role
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/api-services-${{ matrix.environment }}-infrastructure-role
      - name: Verify deployment outcome
        env:
          SERVICE_ARN: ${{ steps.deploy.outputs.service-arn }}
        run: |
          set -euo pipefail
          if [[ -z "${SERVICE_ARN}" ]]; then
            echo "::error::deploy step did not emit a service-arn output"
            exit 1
          fi
          DEPLOY_ARN=$(aws ecs list-service-deployments \
            --cluster api-services-${{ matrix.environment }} \
            --service "${SERVICE_ARN}" \
            --query 'serviceDeployments[0].serviceDeploymentArn' \
            --output text)
          if [[ -z "${DEPLOY_ARN}" || "${DEPLOY_ARN}" == "None" ]]; then
            echo "::error::Could not find a service deployment for ${SERVICE_ARN}"
            exit 1
          fi
          STATUS=$(aws ecs describe-service-deployments \
            --service-deployment-arns "${DEPLOY_ARN}" \
            --query 'serviceDeployments[0].status' \
            --output text)
          echo "Deployment ${DEPLOY_ARN} final status: ${STATUS}"
          if [[ "${STATUS}" != "SUCCESSFUL" ]]; then
            echo "::error::Deployment did not succeed (status=${STATUS})"
            exit 1
          fi
