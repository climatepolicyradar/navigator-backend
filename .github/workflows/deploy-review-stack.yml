# trunk-ignore-all(checkov/CKV2_GHA_1)
name: Patch review stack label gating

# This workflow runs once on push to main to ensure the reviewStackLabels
# setting is applied to each microservice's review template stack.
# The DeploymentSettings resource in review-stack-shared-resources sets up
# pullRequestTemplate=true via the Pulumi SDK, but reviewStackLabels is
# not yet exposed in the Python SDK so we patch it via the REST API here.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-review-stack.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  patch-review-stack-labels:
    runs-on: ubuntu-latest
    env:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      ORG: climatepolicyradar
    strategy:
      matrix:
        service:
          - families-api
          - geographies-api
          - concepts-api
          - data-in-api
    steps:
      - name: Patch reviewStackLabels for ${{ matrix.service }}
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          # The PATCH (POST) endpoint merges into existing deployment
          # settings so only the gitHub.reviewStackLabels key is touched.
          response=$(curl -fsSL -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${PULUMI_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.pulumi.com/api/stacks/${ORG}/${SERVICE}/review/deployments/settings" \
            -d '{"gitHub": {"reviewStackLabels": ["deploy:dev"]}}')

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n1)
          echo "Patched reviewStackLabels for ${SERVICE}: HTTP $status"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Failed to patch reviewStackLabels"
            echo "$body" | jq . 2>/dev/null || echo "$body"
            exit 1
          fi
